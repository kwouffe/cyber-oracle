<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Oracle</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background-color: #f9f7f2;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        h1 { font-weight: normal; color: #5d6d7e; letter-spacing: 2px; }

        .controls { 
            margin: 30px 0; 
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: #8e9eab;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover { background: #7a8a99; transform: translateY(-2px); }
        
        button.secondary { background: #bcaaa4; }
        button.secondary:hover { background: #a1887f; }

        /* Zone de tirage unique */
        #single-card-display {
            width: 300px;
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid #eee;
            text-align: center;
            display: none; 
            margin-bottom: 50px;
            animation: fadeIn 0.6s ease;
        }

        /* Grille pour "Toutes les cartes" */
        #all-cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
            margin-top: 40px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #eee;
            text-align: center;
            transition: transform 0.3s;
        }
        .card:hover { transform: scale(1.02); }

        .card-img {
            width: 100%;
            height: auto;
            border-radius: 5px;
            margin-bottom: 15px;
            background: #fdfdfd;
        }

        .card-category {
            text-transform: uppercase;
            font-size: 0.65rem;
            color: #bcaaa4;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 1.2rem;
            margin: 10px 0;
            color: #444;
        }

        .card-desc {
            font-size: 0.9rem;
            font-style: italic;
            line-height: 1.4;
            color: #666;
        }

        .card-advice {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #f5f5f5;
            font-size: 0.8rem;
            color: #888;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        hr { width: 100%; max-width: 1000px; border: 0; border-top: 1px solid #ddd; margin: 40px 0; }
    </style>
</head>
<body>

    <h1>Cybeeeeeeeer !</h1>
    
    <div class="controls">
        <button onclick="drawCard()">Choisi ton destiiiing !</button>
        <button class="secondary" onclick="toggleAllCards()">voir toute les cartes</button>
    </div>

    <!-- Affichage d'une carte seule -->
    <div id="single-card-display">
        <div class="card-category" id="s-cat"></div>
        <img src="" alt="" class="card-img" id="s-img">
        <h2 class="card-title" id="s-title"></h2>
        <div class="card-desc" id="s-desc"></div>
        <div class="card-advice" id="s-advice"></div>
    </div>

    <div id="grid-title" style="display:none; width: 100%; text-align: center;">
        <hr>
        <h2>Toutes les cartes</h2>
    </div>

    <!-- Grille de toutes les cartes -->
    <div id="all-cards-grid"></div>

    <script src="cards.js"></script>

    <script>
        // Fonction pour tirer UNE carte au hasard
        function drawCard() {
            if (typeof oracleData === 'undefined') return;
            
            // Masquer la grille si elle est ouverte pour mieux voir la carte tirée
            document.getElementById('all-cards-grid').innerHTML = "";
            document.getElementById('grid-title').style.display = "none";

            const card = oracleData[Math.floor(Math.random() * oracleData.length)];

            document.getElementById('s-cat').innerText = card.category;
            document.getElementById('s-img').src = card.image;
            document.getElementById('s-title').innerText = card.name;
            document.getElementById('s-desc').innerText = `"${card.description}"`;
            document.getElementById('s-advice').innerHTML = `<strong>Conseil :</strong> ${card.advice}`;

            document.getElementById('single-card-display').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Fonction pour afficher TOUTES les cartes
        function toggleAllCards() {
            const grid = document.getElementById('all-cards-grid');
            const gridTitle = document.getElementById('grid-title');
            
            // Si la grille est déjà pleine, on la vide (toggle)
            if (grid.innerHTML !== "") {
                grid.innerHTML = "";
                gridTitle.style.display = "none";
                return;
            }

            // Sinon, on génère les cartes
            gridTitle.style.display = "block";
            grid.innerHTML = ""; // On nettoie au cas où
            
            oracleData.forEach(card => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card';
                cardDiv.innerHTML = `
                    <div class="card-category">${card.category}</div>
                    <img src="${card.image}" class="card-img">
                    <h3 class="card-title">${card.name}</h3>
                    <div class="card-desc">"${card.description}"</div>
                    <div class="card-advice">${card.advice}</div>
                `;
                grid.appendChild(cardDiv);
            });
        }
    </script>

</body>
</html>
