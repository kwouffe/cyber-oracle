<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber oracle</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background-color: #f9f7f2;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        h1 { font-weight: normal; color: #5d6d7e; letter-spacing: 2px; }

        .draw-container { margin: 30px 0; }

        button {
            background: #8e9eab;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        button:hover {
            background: #7a8a99;
            transform: translateY(-2px);
        }

        /* Card Styling */
        #card-display {
            width: 320px;
            min-height: 500px;
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid #eee;
            text-align: center;
            display: none; /* Hidden until first draw */
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 20px;
            background: #fdfdfd;
        }

        .card-category {
            text-transform: uppercase;
            font-size: 0.75rem;
            color: #bcaaa4;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .card-title {
            font-size: 1.8rem;
            margin: 10px 0;
            color: #444;
        }

        .card-desc {
            font-style: italic;
            line-height: 1.6;
            color: #666;
            margin: 20px 0;
        }

        .card-advice {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>

    <h1>Cybeeeeeer !</h1>
    
    <div class="draw-container">
        <button onclick="drawCard()">Choisi ton desting !</button>
    </div>

    <div id="card-display">
        <div class="card-category" id="c-cat"></div>
        <img src="" alt="Card Art" class="card-img" id="c-img">
        <h2 class="card-title" id="c-title"></h2>
        <div class="card-desc" id="c-desc"></div>
        <div class="card-advice" id="c-advice"></div>
    </div>

    <!-- THIS IS THE KEY: We load the data file as a script -->
    <script src="cards.js"></script>

    <script>
        function drawCard() {
            // Check if data loaded
            if (typeof oracleData === 'undefined') {
                alert("Erreur: Le fichier cards.js est introuvable.");
                return;
            }

            // Pick a random card
            const card = oracleData[Math.floor(Math.random() * oracleData.length)];

            // Update UI
            document.getElementById('c-cat').innerText = card.category;
            document.getElementById('c-img').src = card.image;
            document.getElementById('c-title').innerText = card.name;
            document.getElementById('c-desc').innerText = `"${card.description}"`;
            document.getElementById('c-advice').innerHTML = `<strong>Conseil :</strong> ${card.advice}`;

            // Show the card
            document.getElementById('card-display').style.display = 'block';
        }
    </script>

</body>
</html>
